<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Animation | Portfolio</title>
  <style>
    :root {
      --stroke-color: #1a1a1a;
      --bg-color: #fafafa;
      --ui-color: #666;
    }

    .dark-mode {
      --stroke-color: #f5f5f5;
      --bg-color: #0a0a0a;
      --ui-color: #999;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: background 0.4s ease;
    }

    .logo-container {
      width: 280px;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      width: 100%;
      height: 100%;
    }

    /* Logo styles */
    .logo-path {
      fill: none;
      stroke: var(--stroke-color);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-miterlimit: 10;
      transition: stroke 0.4s ease;
    }

    .logo-circle {
      fill: none;
      stroke: var(--stroke-color);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-miterlimit: 10;
      transition: stroke 0.4s ease;
    }

    /* ========== SKETCH / DRAW-ON ANIMATION ========== */

    /* Path 1 - Top loop through left loop */
    .path-1 {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: sketchPath1 1.4s cubic-bezier(0.4, 0, 0.2, 1) 0.1s forwards;
    }

    @keyframes sketchPath1 {
      to {
        stroke-dashoffset: 0;
      }
    }

    /* Path 2 - Right loop through tail */
    .path-2 {
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: sketchPath2 1.6s cubic-bezier(0.4, 0, 0.2, 1) 0.6s forwards;
    }

    @keyframes sketchPath2 {
      to {
        stroke-dashoffset: 0;
      }
    }

    /* Connector 1 - Left diagonal */
    .connector-1 {
      stroke-dasharray: 20;
      stroke-dashoffset: 20;
      animation: sketchConnector 0.5s cubic-bezier(0.4, 0, 0.2, 1) 1.1s forwards;
    }

    /* Connector 2 - Right diagonal */
    .connector-2 {
      stroke-dasharray: 20;
      stroke-dashoffset: 20;
      animation: sketchConnector 0.5s cubic-bezier(0.4, 0, 0.2, 1) 1.3s forwards;
    }

    @keyframes sketchConnector {
      to {
        stroke-dashoffset: 0;
      }
    }

    /* Circles - draw on with circumference */
    .circle-small {
      stroke-dasharray: 13.5; /* 2 * PI * 2.144 ≈ 13.47 */
      stroke-dashoffset: 13.5;
    }

    .circle-large {
      stroke-dasharray: 16.4; /* 2 * PI * 2.612 ≈ 16.41 */
      stroke-dashoffset: 16.4;
    }

    .circle-top {
      animation: sketchCircleLarge 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.35s forwards;
    }

    .circle-left {
      animation: sketchCircleSmall 0.6s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards;
    }

    .circle-right {
      animation: sketchCircleSmall 0.6s cubic-bezier(0.4, 0, 0.2, 1) 1.0s forwards;
    }

    @keyframes sketchCircleSmall {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes sketchCircleLarge {
      to {
        stroke-dashoffset: 0;
      }
    }

    /* ========== UI CONTROLS ========== */
    .controls {
      position: fixed;
      bottom: 40px;
      display: flex;
      gap: 16px;
    }

    button {
      padding: 12px 24px;
      border: 1px solid var(--ui-color);
      border-radius: 8px;
      background: transparent;
      color: var(--ui-color);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: var(--stroke-color);
      color: var(--bg-color);
      border-color: var(--stroke-color);
    }

    .size-info {
      position: fixed;
      top: 20px;
      right: 20px;
      color: var(--ui-color);
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="logo-container" id="logoContainer">
    <svg class="logo" viewBox="0 0 28 32" xmlns="http://www.w3.org/2000/svg">
      <!-- Main flowing path - top loop through left loop -->
      <path class="logo-path path-1" d="M13.98,11.874
        c3.65,0,6.813-4.848,4.356-7.936c-1.016-1.276-2.699-1.595-4.247-1.606c-2.557-0.017-5.051,1.843-5.882,4.232
        c-1.43,4.111,3.831,6.32,4.57,9.979c0.466,2.306-0.805,4.905-3.262,5.291C8.457,22,7.371,21.783,6.357,21.434
        c-0.886-0.305-1.743-0.715-2.48-1.292c-1.189-0.93-2.016-2.274-1.831-3.821C2.204,14.99,3.04,13.78,4.17,13.079
        c0.518-0.322,1.102-0.538,1.709-0.613"/>

      <!-- Flowing path - right loop through tail -->
      <path class="logo-path path-2" d="M15.992,18.453
        c1.296,1.586,2.941,2.981,4.935,3.106c1.552,0.097,3.086-0.745,3.988-2.011c0.902-1.266,1.207-2.901,1.008-4.443
        c-0.167-1.301-0.807-2.681-1.975-3.366c-3.924-2.302-7.257,4.918-8.338,7.554c-1.173,2.86-2.043,5.857-3.533,8.564
        c-0.376,0.683-0.838,1.387-1.562,1.677c-0.698,0.28-1.529,0.1-2.126-0.357c-1.203-0.92-1.62-2.827-0.347-3.889
        c1.762-1.47,3.934,0.862,5.323,1.788c1.123,0.748,3.475,2.78,5.026,2.299"/>

      <!-- Connector lines -->
      <path class="logo-path connector-1" d="M13.117,11.726
        c-1.099,1.851-3.03,4.304-4.552,6.082"/>
      <path class="logo-path connector-2" d="M19.396,17.808
        c-1.522-1.778-3.453-4.231-4.552-6.083"/>

      <!-- Decorative circles -->
      <circle class="logo-circle circle-small circle-left" cx="7.137" cy="19.407" r="2.144"/>
      <circle class="logo-circle circle-small circle-right" cx="20.824" cy="19.407" r="2.144"/>
      <circle class="logo-circle circle-large circle-top" cx="13.981" cy="9.26" r="2.612"/>
    </svg>
  </div>

  <div class="controls">
    <button onclick="replayAnimation()">Replay Animation</button>
    <button onclick="toggleTheme()">Toggle Theme</button>
  </div>

  <div class="size-info">Original: 28 × 32px</div>

  <script>
    function replayAnimation() {
      const container = document.getElementById('logoContainer');
      const animatedElements = container.querySelectorAll('.path-1, .path-2, .connector-1, .connector-2, .circle-small, .circle-large');

      animatedElements.forEach(el => {
        el.style.animation = 'none';
      });

      // Force reflow
      void container.offsetWidth;

      // Restore animations
      animatedElements.forEach(el => {
        el.style.animation = '';
      });
    }

    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') replayAnimation();
      if (e.key === 't' || e.key === 'T') toggleTheme();
    });
  </script>
</body>
</html>
